<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDL Assessment 2.0 — Forval Vietnam</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #ffffff;
  --bg2: #f5f5f5;
  --bg3: #ebebeb;
  --text: #111111;
  --text2: #5f5f5f;
  --text3: #909090;
  --border: rgba(0,0,0,0.10);
  --border2: rgba(0,0,0,0.20);
  --r-md: 8px;
  --r-lg: 12px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1e;
    --bg2: #2c2c2e;
    --bg3: #3a3a3c;
    --text: #f2f2f7;
    --text2: #ababab;
    --text3: #6e6e73;
    --border: rgba(255,255,255,0.10);
    --border2: rgba(255,255,255,0.20);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;padding:0 16px 48px}
#app{max-width:680px;margin:0 auto;padding:0 0 32px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 0 20px;border-bottom:0.5px solid var(--border);margin-bottom:24px}
.logo{font-size:13px;font-weight:500;color:var(--text2);letter-spacing:.5px}
.logo span{color:#b8962e}
.steps-row{display:flex;gap:5px;align-items:center}
.step-dot{width:7px;height:7px;border-radius:50%;background:var(--border2);transition:all .3s}
.step-dot.done{background:#b8962e}
.step-dot.active{background:#1a2e52;width:20px;border-radius:3px}
.hero{padding:28px 0 22px;border-bottom:0.5px solid var(--border);margin-bottom:24px}
.hero-tag{font-size:11px;font-weight:500;letter-spacing:1.5px;color:#b8962e;text-transform:uppercase;margin-bottom:10px}
.hero-h{font-size:24px;font-weight:500;color:var(--text);line-height:1.3;margin-bottom:8px}
.hero-sub{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:20px}
.meta-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px}
.meta-card{background:var(--bg2);border-radius:var(--r-md);padding:12px 14px}
.meta-card .mn{font-size:20px;font-weight:500;color:#1a2e52}
.meta-card .ml{font-size:12px;color:var(--text2);margin-top:2px}
.notice{background:#fdf8ee;border:0.5px solid #e8c97a;border-left:3px solid #b8962e;border-radius:0 var(--r-md) var(--r-md) 0;padding:10px 14px;font-size:13px;color:#633806;line-height:1.6}
@media (prefers-color-scheme: dark) { .notice{background:#2a2410;color:#e8c97a} }
.gold-btn{background:#1a2e52;color:#fff;border:none;padding:12px 32px;border-radius:var(--r-md);font-size:14px;font-weight:500;cursor:pointer;transition:background .15s;display:inline-flex;align-items:center;gap:8px}
.gold-btn:hover{background:#243f6e}
.gold-btn.amber{background:#b8962e}
.gold-btn.amber:hover{background:#9a7d26}
.gold-btn:disabled{opacity:.45;cursor:default}
.ghost-btn{background:none;border:0.5px solid var(--border2);color:var(--text);padding:12px 24px;border-radius:var(--r-md);font-size:14px;cursor:pointer}
.ghost-btn:hover{background:var(--bg2)}
.field-group{margin-bottom:14px}
.field-label{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;display:block}
.field-input{width:100%;border:0.5px solid var(--border2);border-radius:var(--r-md);padding:10px 13px;font-size:15px;background:var(--bg);color:var(--text);font-family:var(--font)}
.field-input:focus{outline:none;border-color:#1a2e52;box-shadow:0 0 0 3px rgba(26,46,82,.08)}
.req{color:#b8962e;margin-left:2px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:520px){.form-grid{grid-template-columns:1fr}}
.dim-head{padding:18px 22px;background:var(--bg2);border-radius:var(--r-lg);margin-bottom:18px;border-left:3px solid #b8962e}
.dim-num{font-size:11px;font-weight:500;color:#b8962e;letter-spacing:1px;text-transform:uppercase}
.dim-title-lg{font-size:17px;font-weight:500;color:var(--text);margin:4px 0 5px}
.dim-desc{font-size:13px;color:var(--text2);line-height:1.6}
.q-wrap{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:18px 22px;margin-bottom:10px}
.q-meta{font-size:11px;font-weight:500;letter-spacing:.7px;color:var(--text2);text-transform:uppercase;margin-bottom:7px}
.q-text{font-size:15px;color:var(--text);line-height:1.5;margin-bottom:14px;font-weight:500}
.score-track{display:flex;gap:7px;margin-bottom:7px}
.s-btn{flex:1;min-height:42px;border:0.5px solid var(--border2);border-radius:var(--r-md);background:var(--bg);cursor:pointer;font-size:15px;font-weight:500;color:var(--text2);transition:all .15s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;font-family:var(--font)}
.s-btn:hover{border-color:#b8962e;color:#b8962e;background:#fdf8ee}
.s-btn.on{background:#1a2e52;border-color:#1a2e52;color:#fff}
.s-btn .sl{font-size:9px;font-weight:400;opacity:.75;line-height:1.2}
.anch{min-height:36px;padding:9px 12px;background:var(--bg2);border-radius:var(--r-md);font-size:13px;color:var(--text2);line-height:1.6;margin-top:4px;font-style:italic}
.anch.live{color:var(--text);font-style:normal;border-left:2px solid #b8962e;padding-left:11px}
.score-ends{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);padding:0 2px;margin-top:2px}
.rc-wrap{background:#fdf8ee;border:0.5px solid #e8c97a;border-radius:var(--r-lg);padding:16px 20px;margin-bottom:10px}
@media(prefers-color-scheme:dark){.rc-wrap{background:#2a2410;border-color:#7a6220}}
.rc-title{font-size:11px;font-weight:500;letter-spacing:.7px;color:#854f0b;text-transform:uppercase;margin-bottom:7px}
.rc-text{font-size:14px;color:var(--text);line-height:1.55;margin-bottom:10px;font-weight:500}
.rc-input-row{display:flex;align-items:center;gap:10px}
.rc-num{width:78px;height:38px;border:0.5px solid #e8c97a;border-radius:var(--r-md);background:#fff;text-align:center;font-size:15px;font-weight:500;color:#633806;font-family:var(--font)}
.rc-num:focus{outline:none;border-color:#b8962e}
.rc-hint{font-size:12px;color:#854f0b;margin-top:7px;line-height:1.5}
.nav-bar{display:flex;justify-content:space-between;align-items:center;margin-top:22px;padding-top:18px;border-top:0.5px solid var(--border)}
.nav-info{font-size:13px;color:var(--text2)}
.err{font-size:13px;color:#c0392b;background:#fff0f0;padding:8px 12px;border-radius:var(--r-md);margin-top:8px}
.act-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
@media(max-width:560px){.act-cols{grid-template-columns:1fr}}
.act-col{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
.act-col-head{padding:12px 14px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:7px}
.act-col-head.start{background:#eaf3de;color:#27500a;border-bottom:0.5px solid #c0dd97}
.act-col-head.maintain{background:#e6f1fb;color:#0c447c;border-bottom:0.5px solid #85b7eb}
.act-col-head.stop{background:#fcebeb;color:#791f1f;border-bottom:0.5px solid #f09595}
.act-col-body{padding:9px 10px}
.chip{width:100%;text-align:left;padding:7px 10px;margin-bottom:5px;border:0.5px solid var(--border);border-radius:var(--r-md);background:var(--bg2);cursor:pointer;font-size:12px;color:var(--text2);line-height:1.5;transition:all .15s;font-family:var(--font)}
.chip:hover{border-color:var(--border2);color:var(--text)}
.chip.sel.start{background:#eaf3de;border-color:#3b6d11;color:#27500a}
.chip.sel.maintain{background:#e6f1fb;border-color:#185fa5;color:#0c447c}
.chip.sel.stop{background:#fcebeb;border-color:#a32d2d;color:#791f1f}
.cc{font-size:12px;padding:2px 8px;border-radius:10px;font-weight:500;margin-left:auto}
.cc.start{background:#eaf3de;color:#27500a}
.cc.maintain{background:#e6f1fb;color:#0c447c}
.cc.stop{background:#fcebeb;color:#791f1f}
.results-top{display:grid;grid-template-columns:1fr 2fr;gap:14px;margin-bottom:18px}
@media(max-width:520px){.results-top{grid-template-columns:1fr}}
.score-big{background:var(--bg2);border-radius:var(--r-lg);padding:22px 18px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;border-left:3px solid #b8962e}
.sb-val{font-size:46px;font-weight:500;line-height:1}
.sb-max{font-size:16px;color:var(--text2)}
.sb-cls{margin-top:8px;font-size:11px;font-weight:500;letter-spacing:.8px;color:#b8962e;text-transform:uppercase}
.dim-scores{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.ds-item{background:var(--bg2);border-radius:var(--r-md);padding:9px 11px;display:flex;justify-content:space-between;align-items:center}
.ds-name{font-size:12px;color:var(--text2)}
.ds-val{font-size:14px;font-weight:500}
.radar-wrap{height:250px;margin:14px 0}
.ar-section{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:10px}
.ar-head{padding:12px 18px;display:flex;align-items:center;gap:9px;font-size:14px;font-weight:500}
.ar-head.start{background:#eaf3de;color:#27500a}
.ar-head.maintain{background:#e6f1fb;color:#0c447c}
.ar-head.stop{background:#fcebeb;color:#791f1f}
.ar-body{padding:10px 18px 14px}
.ar-item{display:flex;gap:9px;font-size:13px;color:var(--text);line-height:1.6;margin-bottom:7px;padding-bottom:7px;border-bottom:0.5px solid var(--border)}
.ar-item:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.ar-num{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;margin-top:2px}
.ar-num.start{background:#eaf3de;color:#27500a}
.ar-num.maintain{background:#e6f1fb;color:#0c447c}
.ar-num.stop{background:#fcebeb;color:#791f1f}
.sub-panel{border-radius:var(--r-lg);padding:18px 22px;margin-top:18px;background:var(--bg2);border:0.5px solid var(--border)}
.sub-panel.success{border-left:3px solid #639922;background:#eaf3de}
.sub-panel.fail{border-left:3px solid #c0392b}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="logo">FORVAL VIETNAM &nbsp;·&nbsp; <span>PDL Assessment 2.0</span></div>
    <div class="steps-row" id="steps-row"></div>
  </div>
  <div id="screen"></div>
</div>

<script>
const WEBHOOK='https://script.google.com/macros/s/AKfycbymxzWNZ-cC7_Y8blOdKOENupuVVwnzcusthjxAVhr7zywgz1RvppJmtn--8IXPfV4z/exec';
const GOLD='#b8962e',NAVY='#1a2e52';

const DIMS=[
{id:'d0',title:'Lãnh đạo Đích thực',sub:'True North',ico:'ti-compass',
desc:'Nhận thức về giá trị cốt lõi, tính nhất quán lời nói–hành động và thói quen phản chiếu bản thân.',
qs:[
{t:'Mức độ nhận thức và hành động theo giá trị cốt lõi cá nhân',
a:['Chưa xác định được giá trị cốt lõi — quyết định theo tình huống và áp lực','Biết mình có giá trị nhưng khó diễn đạt — hành động thiếu nhất quán','Xác định được 3–5 giá trị và thường hành động theo trong điều kiện bình thường','Giá trị cốt lõi định hướng rõ hầu hết quyết định kể cả khi chịu áp lực','Sống và lãnh đạo nhất quán hoàn toàn — là tấm gương rõ ràng cho đội ngũ']},
{t:'Tính nhất quán giữa lời nói và hành động',
a:['Thường nói một đằng, làm một nẻo — đặc biệt dưới áp lực','Cố gắng nhất quán nhưng hay bị lợi ích ngắn hạn cuốn đi','Nhất quán trong bình thường, đôi khi lung lay khi lợi ích mâu thuẫn','Nhất quán kể cả khi phải trả giá ngắn hạn — hành vi có thể dự đoán','Được tin tưởng hoàn toàn vì sự nhất quán tuyệt đối']},
{t:'Thói quen phản chiếu và điều chỉnh bản thân định kỳ',
a:['Hiếm khi dành thời gian suy nghĩ về cách mình lãnh đạo','Phản chiếu khi có vấn đề xảy ra — phản ứng, không chủ động','Dành thời gian định kỳ đánh giá bản thân, có một số thói quen','Chủ động tìm phản hồi từ nhiều nguồn và điều chỉnh liên tục','Có hệ thống phản chiếu rõ — chia sẻ bài học cá nhân với đội ngũ như thực hành lãnh đạo']}],
rc:{l:'Trong 3 tháng qua, tổng số lần: từ chối yêu cầu mâu thuẫn với giá trị + chia sẻ thật điểm yếu/sai lầm với team + điều chỉnh quyết định vì lệch giá trị',h:'0 → 1đ  |  1–2 → 2đ  |  3–5 → 3đ  |  6–9 → 4đ  |  10+ → 5đ',t:'count'},
act:{
start:['Làm "Values Audit" 30 phút: viết 10 giá trị, loại còn 3, chuyển thành 1 câu hành vi cụ thể cho mỗi giá trị','Áp dụng "Public Test" trước quyết định khó: nếu điều này được công khai với người tôi kính trọng nhất, tôi có thoải mái không?','Dành 10 phút mỗi thứ Hai: tình huống nào thử thách True North của tôi tuần này, tôi sẽ phản hồi thế nào?'],
maintain:['Chia sẻ định kỳ "leadership failure" — khoảnh khắc từng lệch khỏi giá trị, điều này tạo an toàn tâm lý mạnh hơn bất kỳ tuyên bố nào','Duy trì "Board of Advisors" cá nhân: 3 người được phép thách thức thẳng thắn, gặp mỗi quý để hỏi tôi đang lệch ở đâu','Viết "Leadership Reflection Letter" mỗi quý 1 trang: quyết định nào tự hào nhất, làm khác gì nếu có lại'],
stop:['Ra quyết định vì tiện lợi, không phải vì giá trị cốt lõi đã xác định','Đưa cam kết không thể giữ được khi gặp áp lực từ cấp trên','Né tránh phản hồi thách thức nhận thức về bản thân']}},

{id:'d1',title:'Tích hợp Mục đích',sub:'Purpose Integration',ico:'ti-target',
desc:'Kết nối mục đích cá nhân với tổ chức và truyền đạt mục đích nhất quán trong công việc hàng ngày.',
qs:[
{t:'Mức độ hiểu và kết nối mục đích cá nhân với mục đích tổ chức',
a:['Chưa rõ mục đích của bản thân hoặc tổ chức','Hiểu sơ bộ nhưng chưa thấy được sự kết nối có ý nghĩa','Hiểu rõ và thấy được một số điểm chung quan trọng','Thấy rõ sự gắn kết giữa mục đích cá nhân và tổ chức','Sống và làm việc hoàn toàn theo mục đích đã kết nối — không tách rời']},
{t:'Khả năng truyền đạt mục đích trong công việc hàng ngày',
a:['Chưa bao giờ chia sẻ về mục đích với đồng nghiệp hay đội ngũ','Đôi khi nhắc đến khi được hỏi trực tiếp','Chia sẻ trong các cuộc họp quan trọng có kế hoạch','Thường xuyên kết nối công việc với mục đích một cách tự nhiên','Truyền cảm hứng cho cả nhóm qua câu chuyện mục đích — mọi người nhắc lại']},
{t:'Tần suất thực hành mục đích trong giao tiếp lãnh đạo',
a:['Không bao giờ — dưới 1 lần mỗi tuần','Hiếm khi — 1 đến 2 lần mỗi tuần','Đôi lúc — 3 đến 4 lần mỗi tuần','Thường xuyên — 5 đến 7 lần mỗi tuần','Rất thường xuyên — 8 lần trở lên mỗi tuần']}],
rc:{l:'Trong tuần vừa qua, tổng số lần: giải thích tại sao đằng sau công việc + kết nối chỉ tiêu với ý nghĩa xã hội/khách hàng + kể câu chuyện tác động cụ thể',h:'0 → 1đ  |  1–3 → 2đ  |  4–6 → 3đ  |  7–9 → 4đ  |  10+ → 5đ',t:'count'},
act:{
start:['Thực hành "5 Whys for Purpose" mỗi ngày với 1 công việc: hỏi tại sao 5 lần liên tiếp, câu trả lời cuối là mục đích thực sự','Mở đầu mỗi cuộc họp bằng 2 phút: cuộc họp này quan trọng với khách hàng và xã hội vì... không phải chỉ vì chỉ tiêu','Kể 1 Purpose Story mỗi tuần trong meeting: tình huống thực, quyết định vì mục đích, kết quả có số liệu trong 3 phút'],
maintain:['Duy trì Purpose Moment trong chōrei hoặc họp đứng: 1 người chia sẻ 2 phút về khoảnh khắc công việc tạo ra sự khác biệt','Tổ chức buổi Ikigai Discovery cho từng thành viên mới giúp họ khám phá mục đích và kết nối với tổ chức','Cập nhật Impact Visibility Board hàng tháng: ảnh và câu chuyện thực về người dùng cuối sản phẩm dịch vụ bạn tạo ra'],
stop:['Giao việc mà không giải thích lý do tại sao công việc đó quan trọng','Bắt đầu họp chỉ với chỉ tiêu và deadline không có ý nghĩa phía sau','Bỏ qua cơ hội nối kết kết quả đo lường với tác động thực tế']}},

{id:'d2',title:'Thực thi Mục đích',sub:'Purpose-Driven Execution',ico:'ti-settings',
desc:'Biến mục đích thành quyết định hành động cụ thể, cải tiến quy trình và đo lường tác động.',
qs:[
{t:'Tích hợp mục đích vào quyết định hàng ngày',

rc:{l:'Số hoạt động chăm sóc well-being đã tổ chức trong 6 tháng qua bao gồm thể chất tinh thần kết nối team và work-life balance',h:'0 → 1đ  |  1–2 → 2đ  |  3–4 → 3đ  |  5–7 → 4đ  |  8+ → 5đ',t:'count'},
act:{
start:['Bắt đầu Energy Check-in: mở đầu 3 cuộc họp tiếp theo bằng quick check năng lượng của mọi người hôm nay từ 1 đến 10, tạo awareness mà không mất 2 phút','Kiểm tra ngay tuần này: có ai trong team làm quá 50 giờ mỗi tuần không, nếu có tìm nguyên nhân gốc rễ và giải quyết nguyên nhân','Thực hành 1 hành vi visible: rời văn phòng đúng giờ ít nhất 3 buổi mỗi tuần và nói với team tôi đi để recharge mọi người làm tương tự'],
maintain:['Tiếp tục đo well-being định kỳ: mỗi tháng anonymous 3-câu survey về mức năng lượng điều gì drain nhất và chúng ta có thể làm gì ngay tuần tới','Duy trì Team Well-being Charter và review 6 tháng một lần cùng team, cam kết chính thức về cách chăm sóc nhau','Tiếp tục làm well-being role model có ý thức: chia sẻ công khai cách bạn bảo vệ năng lượng và recharge để trao permission cho team'],
stop:['Coi tăng ca và làm ngoài giờ như bằng chứng của sự tận tâm và gắn bó','Bỏ qua tín hiệu kiệt sức burnout trong team cho đến khi đã trở thành vấn đề','Để well-being là ưu tiên và trách nhiệm của HR thay vì của lãnh đạo trực tiếp']}}
];

const SL=['Chưa thể hiện','Bắt đầu','Đang phát triển','Thể hiện tốt','Xuất sắc'];

let state={
  step:0,
  info:{name:'',company:'',role:'',email:''},
  scores:Object.fromEntries(DIMS.map(d=>[d.id,[null,null,null,null]])),
  actions:{start:[],maintain:[],stop:[]},
  chartInst:null
};

function dAvg(id){const s=state.scores[id],v=s.filter(x=>x!==null);return v.length?v.reduce((a,b)=>a+b,0)/v.length:0;}
function getCls(avg){
  if(avg>=4.3)return{label:'Purpose Catalyst',color:'#27500a',bg:'#eaf3de'};
  if(avg>=3.5)return{label:'Purpose Champion',color:NAVY,bg:'#e6f1fb'};
  if(avg>=2.5)return{label:'Purpose Builder',color:'#3c3489',bg:'#eeedfe'};
  return{label:'Purpose Explorer',color:'#633806',bg:'#faeeda'};
}
function rcS(dim,val){
  const v=parseFloat(val)||0;
  if(dim.rc.t==='pct'){if(v<=20)return 1;if(v<=40)return 2;if(v<=60)return 3;if(v<=80)return 4;return 5;}
  if(dim.rc.t==='rank'){if(v>=5||v===0)return 1;if(v===4)return 2;if(v===3)return 3;if(v===2)return 4;return 5;}
  if(v===0)return 1;if(v<=2)return 2;if(v<=5)return 3;if(v<=9)return 4;return 5;
}
function updSteps(){
  const el=document.getElementById('steps-row');if(!el)return;
  let h='';for(let i=0;i<12;i++){const c=i<state.step?'done':i===state.step?'active':'';h+=`<div class="step-dot ${c}"></div>`;}el.innerHTML=h;
}
function setScore(id,qi,val){
  state.scores[id][qi]=val;
  document.querySelectorAll(`.s-btn[data-k="${id}-${qi}"]`).forEach(b=>b.classList.toggle('on',parseInt(b.dataset.v)===val));
  const el=document.getElementById(`anch-${id}-${qi}`);
  if(el){el.textContent=DIMS.find(d=>d.id===id).qs[qi].a[val-1];el.className='anch live';}
}
function setRC(id,val){state.scores[id][3]=rcS(DIMS.find(d=>d.id===id),val);}
function togAct(cat,text){
  const arr=state.actions[cat],idx=arr.indexOf(text);
  if(idx>-1)arr.splice(idx,1);else if(arr.length<3)arr.push(text);
  document.querySelectorAll(`.chip[data-cat="${cat}"]`).forEach(c=>c.classList.toggle('sel',arr.includes(c.dataset.t)));
  const cnt=document.getElementById(`cnt-${cat}`);if(cnt)cnt.textContent=`${arr.length}/3`;
}
function showErr(msg){
  let el=document.getElementById('err-el');
  if(!el){el=document.createElement('div');el.id='err-el';el.className='err';document.getElementById('app').appendChild(el);}
  el.textContent=msg;setTimeout(()=>{if(el.parentNode)el.remove();},3500);
}
function goNext(){
  if(state.step===1&&(!state.info.name||!state.info.company||!state.info.role)){showErr('Vui lòng điền đầy đủ Họ tên, Công ty và Chức danh.');return;}
  if(state.step>=2&&state.step<=9&&DIMS[state.step-2]){
    if(state.scores[DIMS[state.step-2].id].slice(0,3).some(x=>x===null)){showErr('Vui lòng trả lời đủ 3 câu a, b, c trước khi tiếp tục.');return;}
  }
  if(state.step===10){
    const{start,maintain,stop}=state.actions;
    if(start.length<3||maintain.length<3||stop.length<3){showErr(`Chọn đủ 3 hành động mỗi cột — Bắt đầu: ${start.length}/3  Duy trì: ${maintain.length}/3  Bỏ bớt: ${stop.length}/3`);return;}
  }
  state.step++;renderApp();window.scrollTo(0,0);
}
function goPrev(){if(state.step>0){state.step--;renderApp();window.scrollTo(0,0);}}

async function submitData(){
  const avgs={};DIMS.forEach(d=>{avgs[d.id]=parseFloat(dAvg(d.id).toFixed(2));});
  const overall=parseFloat((Object.values(avgs).reduce((a,b)=>a+b,0)/8).toFixed(2));
  const cls=getCls(overall);
  const payload={...state.info,...avgs,overall,classification:cls.label,start:state.actions.start,maintain:state.actions.maintain,stop:state.actions.stop};
  const btn=document.getElementById('sub-btn');const panel=document.getElementById('sub-panel');
  if(btn)btn.disabled=true;
  panel.innerHTML=`<div style="font-size:14px;color:var(--text2);display:flex;align-items:center;gap:8px"><i class="ti ti-loader" style="font-size:18px"></i>Đang gửi dữ liệu về Google Sheets...</div>`;
  try{
    await fetch(WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload),mode:'no-cors'});
    panel.className='sub-panel success';
    panel.innerHTML=`<div style="font-size:14px;color:#27500a;display:flex;align-items:center;gap:10px"><i class="ti ti-circle-check" style="font-size:22px"></i><span><strong>Đã gửi thành công.</strong> Kết quả của ${state.info.name} đã được ghi vào Google Sheets.</span></div>`;
  }catch(e){
    panel.className='sub-panel fail';
    panel.innerHTML=`<div style="font-size:14px;color:#c0392b"><i class="ti ti-alert-triangle"></i> Lỗi kết nối. Kiểm tra lại quyền truy cập của Apps Script.</div>`;
    if(btn)btn.disabled=false;
  }
}

function renderApp(){
  updSteps();
  const s=document.getElementById('screen');
  if(state.step===0)s.innerHTML=rWelcome();
  else if(state.step===1)s.innerHTML=rInfo();
  else if(state.step>=2&&state.step<=9)s.innerHTML=rDim(state.step-2);
  else if(state.step===10)s.innerHTML=rActions();
  else{s.innerHTML=rResults();setTimeout(drawRadar,150);}
}

function rWelcome(){return`
<div class="hero">
  <div class="hero-tag">Purpose Driven Leadership · Forval Vietnam</div>
  <div class="hero-h">Đánh giá Năng lực Lãnh đạo Định hướng Mục đích</div>
  <div class="hero-sub">Công cụ đánh giá chuyên sâu dành cho lãnh đạo cấp cao — 8 chiều năng lực, 32 tiêu chí hành vi quan sát được. Báo cáo cá nhân hoá và kế hoạch hành động tức thì.</div>
  <div class="meta-row">
    <div class="meta-card"><div class="mn">8</div><div class="ml">Chiều năng lực</div></div>
    <div class="meta-card"><div class="mn">32</div><div class="ml">Tiêu chí hành vi</div></div>
    <div class="meta-card"><div class="mn">15'</div><div class="ml">Thời gian hoàn thành</div></div>
  </div>
  <div class="notice">Đánh giá dựa trên <strong>hành vi thực tế 3 tháng qua</strong>, không phải mong muốn hay kỳ vọng. So sánh với chính mình — không có điểm xấu, chỉ có cơ hội phát triển.</div>
</div>
<div style="margin-top:22px">
  <button class="gold-btn amber" onclick="goNext()"><i class="ti ti-arrow-right"></i>Bắt đầu đánh giá</button>
</div>`;}

function rInfo(){return`
<div style="margin-bottom:20px">
  <div style="font-size:11px;font-weight:500;letter-spacing:1px;color:${GOLD};text-transform:uppercase;margin-bottom:7px">Thông tin tham dự</div>
  <div style="font-size:17px;font-weight:500;color:var(--text);margin-bottom:5px">Vui lòng điền thông tin của bạn</div>
  <div style="font-size:13px;color:var(--text2)">Thông tin này cá nhân hoá báo cáo và lưu kết quả về hệ thống theo dõi của tổ chức.</div>
</div>
<div class="form-grid">
  <div class="field-group"><label class="field-label">Họ và tên<span class="req">*</span></label><input class="field-input" type="text" placeholder="Nguyễn Văn A" value="${state.info.name}" oninput="state.info.name=this.value"></div>
  <div class="field-group"><label class="field-label">Công ty<span class="req">*</span></label><input class="field-input" type="text" placeholder="Tên công ty" value="${state.info.company}" oninput="state.info.company=this.value"></div>
  <div class="field-group"><label class="field-label">Chức danh<span class="req">*</span></label><input class="field-input" type="text" placeholder="General Manager, Director..." value="${state.info.role}" oninput="state.info.role=this.value"></div>
  <div class="field-group"><label class="field-label">Email</label><input class="field-input" type="email" placeholder="email@company.com" value="${state.info.email}" oninput="state.info.email=this.value"></div>
</div>
<div class="nav-bar">
  <button class="ghost-btn" onclick="goPrev()">← Quay lại</button>
  <span class="nav-info">Bước 1 / 10</span>
  <button class="gold-btn" onclick="goNext()">Tiếp theo →</button>
</div>`;}

function rDim(idx){
  const dim=DIMS[idx];const sc=state.scores[dim.id];
  let h=`<div class="dim-head">
    <div class="dim-num">Chiều ${idx+1} / 8 · ${dim.sub}</div>
    <div class="dim-title-lg"><i class="ti ${dim.ico}" style="font-size:18px;vertical-align:-3px;margin-right:7px;color:${GOLD}"></i>${dim.title}</div>
    <div class="dim-desc">${dim.desc}</div>
  </div>`;
  dim.qs.forEach((q,qi)=>{
    const cur=sc[qi];
    h+=`<div class="q-wrap">
      <div class="q-meta">Câu ${['a','b','c'][qi]}</div>
      <div class="q-text">${q.t}</div>
      <div class="score-track">`;
    for(let i=1;i<=5;i++){
      h+=`<button class="s-btn${cur===i?' on':''}" data-k="${dim.id}-${qi}" data-v="${i}"
        onclick="setScore('${dim.id}',${qi},${i})"
        onmouseenter="pA('${dim.id}',${qi},\`${q.a[i-1].replace(/`/g,"'")}\`)"
        onmouseleave="rA('${dim.id}',${qi})">${i}<span class="sl">${SL[i-1].split(' ')[0]}</span></button>`;
    }
    h+=`</div><div class="score-ends"><span>Chưa thể hiện</span><span>Xuất sắc</span></div>
      <div class="anch${cur?' live':''}" id="anch-${dim.id}-${qi}">${cur?q.a[cur-1]:'Chọn mức độ để xem mô tả hành vi cụ thể...'}</div>
    </div>`;
  });
  const hint=dim.rc.t==='pct'?'Nhập % (0–100)':dim.rc.t==='rank'?'Nhập vị trí (1–5)':'Nhập tổng số lần';
  h+=`<div class="rc-wrap">
    <div class="rc-title"><i class="ti ti-check"></i>&nbsp;Kiểm chứng thực tế</div>
    <div class="rc-text">${dim.rc.l}</div>
    <div class="rc-input-row"><span style="font-size:13px;color:#854f0b">${hint}:</span>
      <input class="rc-num" type="number" min="0" placeholder="0" oninput="setRC('${dim.id}',this.value)">
    </div>
    <div class="rc-hint">${dim.rc.h}</div>
  </div>
  <div class="nav-bar">
    <button class="ghost-btn" onclick="goPrev()">← Quay lại</button>
    <span class="nav-info">Chiều ${idx+1} / 8</span>
    <button class="gold-btn" onclick="goNext()">${idx===7?'Chọn hành động →':'Tiếp theo →'}</button>
  </div>`;
  return h;
}
function pA(id,qi,t){const el=document.getElementById(`anch-${id}-${qi}`);if(el){el.textContent=t;el.className='anch live';}}
function rA(id,qi){
  const dim=DIMS.find(d=>d.id===id);const cur=state.scores[id][qi];
  const el=document.getElementById(`anch-${id}-${qi}`);
  if(el){if(cur){el.textContent=dim.qs[qi].a[cur-1];el.className='anch live';}else{el.textContent='Chọn mức độ để xem mô tả hành vi cụ thể...';el.className='anch';}}
}

function rActions(){
  const avgs=DIMS.map(d=>({id:d.id,avg:dAvg(d.id)})).sort((a,b)=>b.avg-a.avg);
  const top3=avgs.slice(0,3).map(x=>DIMS.find(d=>d.id===x.id));
  const bot3=avgs.slice(-3).map(x=>DIMS.find(d=>d.id===x.id));
  const pools={
    start:[...new Set(bot3.flatMap(d=>d.act.start))],
    maintain:[...new Set(top3.flatMap(d=>d.act.maintain))],
    stop:[...new Set(bot3.flatMap(d=>d.act.stop))]
  };
  function col(cat,label,hcls,ico,pool){
    const sel=state.actions[cat];
    return`<div class="act-col">
      <div class="act-col-head ${hcls}"><i class="ti ${ico}" style="font-size:15px"></i>${label}<span class="cc ${hcls}" id="cnt-${cat}" style="margin-left:auto">${sel.length}/3</span></div>
      <div class="act-col-body">${pool.map(t=>`<button class="chip${sel.includes(t)?` sel ${cat}':''}" data-cat="${cat}" data-t="${t.replace(/"/g,'&quot;')}" onclick="togAct('${cat}','${t.replace(/'/g,"\\'")}')">
        ${t}</button>`).join('')}</div>
    </div>`;
  }
  return`<div style="margin-bottom:18px">
    <div style="font-size:11px;font-weight:500;letter-spacing:1px;color:${GOLD};text-transform:uppercase;margin-bottom:7px">Kế hoạch hành động</div>
    <div style="font-size:17px;font-weight:500;color:var(--text);margin-bottom:5px">Chọn 3 hành động cho mỗi cột</div>
    <div style="font-size:13px;color:var(--text2)">Gợi ý được tạo tự động dựa trên điểm số của bạn. Chọn đúng 3 hành động mỗi cột để hoàn thiện kế hoạch phát triển cá nhân.</div>
  </div>
  <div class="act-cols">
    ${col('start','Bắt đầu','start','ti-plus',pools.start)}
    ${col('maintain','Duy trì','maintain','ti-refresh',pools.maintain)}
    ${col('stop','Bỏ bớt','stop','ti-minus',pools.stop)}
  </div>
  <div class="nav-bar">
    <button class="ghost-btn" onclick="goPrev()">← Quay lại</button>
    <span class="nav-info">Bước 10 / 10</span>
    <button class="gold-btn" onclick="goNext()">Xem kết quả →</button>
  </div>`;}

function rResults(){
  const avgs=DIMS.map(d=>({id:d.id,name:d.title,ico:d.ico,v:parseFloat(dAvg(d.id).toFixed(1))}));
  const overall=parseFloat((avgs.reduce((a,b)=>a+b.v,0)/8).toFixed(1));
  const cls=getCls(overall);
  const cOf=v=>v>=4.5?'#27500a':v>=3.5?NAVY:v>=2.5?'#3c3489':'#a32d2d';
  const dGrid=avgs.map(a=>`<div class="ds-item"><span class="ds-name"><i class="ti ${DIMS.find(d=>d.id===a.id).ico}" style="font-size:13px;margin-right:5px;vertical-align:-1px;color:${GOLD}"></i>${a.name}</span><span class="ds-val" style="color:${cOf(a.v)}">${a.v.toFixed(1)}</span></div>`).join('');
  function sect(cat,label,hcls,ico){
    return`<div class="ar-section"><div class="ar-head ${hcls}"><i class="ti ${ico}" style="font-size:15px"></i>${label}</div>
    <div class="ar-body">${state.actions[cat].map((t,i)=>`<div class="ar-item"><div class="ar-num ${cat}">${i+1}</div><div>${t}</div></div>`).join('')}</div></div>`;
  }
  return`<div style="margin-bottom:14px">
    <div style="font-size:11px;font-weight:500;letter-spacing:1px;color:${GOLD};text-transform:uppercase;margin-bottom:5px">Kết quả đánh giá</div>
    <div style="font-size:17px;font-weight:500;color:var(--text)">${state.info.name} · ${state.info.company}</div>
  </div>
  <div class="results-top">
    <div class="score-big">
      <div class="sb-val" style="color:${cls.color}">${overall.toFixed(1)}<span class="sb-max"> /5.0</span></div>
      <div class="sb-cls">${cls.label}</div>
      <div style="font-size:12px;color:var(--text2);margin-top:5px">${state.info.role}</div>
    </div>
    <div class="dim-scores">${dGrid}</div>
  </div>
  <div class="radar-wrap"><canvas id="radar-cv"></canvas></div>
  ${sect('start','3 hành vi cần bắt đầu ngay','start','ti-plus')}
  ${sect('maintain','3 hành vi cần tiếp tục duy trì','maintain','ti-refresh')}
  ${sect('stop','3 hành vi cần dừng lại','stop','ti-minus')}
  <div class="sub-panel" id="sub-panel">
    <div style="font-size:13px;color:var(--text2);margin-bottom:12px">Gửi kết quả về hệ thống theo dõi của Forval Vietnam. Dữ liệu sẽ ghi tức thì vào Google Sheets.</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="gold-btn amber" id="sub-btn" onclick="submitData()"><i class="ti ti-send"></i>Gửi về Google Sheets</button>
      <button class="ghost-btn" onclick="goPrev()">← Xem lại hành động</button>
    </div>
  </div>`;}

function drawRadar(){
  const cv=document.getElementById('radar-cv');if(!cv)return;
  if(state.chartInst){state.chartInst.destroy();state.chartInst=null;}
  const dark=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches;
  const gc=dark?'rgba(255,255,255,0.1)':'rgba(0,0,0,0.07)';
  const tc=dark?'rgba(255,255,255,0.6)':'rgba(0,0,0,0.5)';
  state.chartInst=new Chart(cv,{type:'radar',
    data:{labels:DIMS.map(d=>d.title),datasets:[{data:DIMS.map(d=>parseFloat(dAvg(d.id).toFixed(2))),backgroundColor:'rgba(26,46,82,0.1)',borderColor:GOLD,pointBackgroundColor:GOLD,pointBorderColor:'#fff',pointRadius:5,borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,
      scales:{r:{min:0,max:5,ticks:{stepSize:1,font:{size:10},color:tc,backdropColor:'transparent'},grid:{color:gc},angleLines:{color:gc},pointLabels:{font:{size:11},color:tc}}},
      plugins:{legend:{display:false}}}});
}

renderApp();
</script>
</body>
</html>
